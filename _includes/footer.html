<footer class="site-footer">
  <div class="site-footer__inner">
    <div class="site-footer__brand">
      <a class="site-footer__logo" href="{{ '/' | relative_url }}">
        <img class="site-logo__img site-logo__img--footer" src="{{ '/assets/images/logo.png' | relative_url }}" alt="IvyFeeder Inc." width="400" height="80" loading="lazy" decoding="async" />
      </a>
      <div class="site-footer__follow followit-site">
        {% include followit-form.html %}
      </div>
    </div>
    <nav class="site-footer__nav" aria-label="Footer">
      <p class="site-footer__nav-heading">Quick links</p>
      <ul class="site-footer__list">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/apps/' | relative_url }}"{% if page.url == '/apps/' %} aria-current="page"{% endif %}>Apps</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
      </ul>
    </nav>
  </div>
  <div class="site-footer__bottom">
    <div class="site-footer__bottom-inner">
      <div class="site-footer__bottom-meta">
        <p class="site-footer__copy">&copy; {{ 'now' | date: '%Y' }} IvyFeeder Inc. All rights reserved.</p>
        <div class="site-footer__contact" role="group" aria-label="Phone and email">
          <div class="site-footer__contact-line">
            <span class="site-footer__contact-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <a class="site-footer__contact-link" href="mailto:info@ivyfeeder.com">info@ivyfeeder.com</a>
          </div>
          <span class="site-footer__contact-sep" aria-hidden="true">•</span>
          <div class="site-footer__contact-line">
            <span class="site-footer__contact-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </span>
            <a class="site-footer__contact-link" href="tel:+16138826872">(613) 882-6872</a>
          </div>
        </div>
        <p class="site-footer__legal-mini">
          <a class="site-footer__legal-link" href="{{ '/privacy-policy/' | relative_url }}"{% if page.url contains 'privacy-policy' %} aria-current="page"{% endif %}>Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>
</footer>
