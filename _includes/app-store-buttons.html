<div class="app-store-buttons">
  {% if include.ios_url %}
  <a class="app-store-buttons__btn app-store-buttons__btn--ios" href="{{ include.ios_url }}" rel="noopener noreferrer" target="_blank">
    <span class="app-store-buttons__icon app-store-buttons__icon--apple" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.28.05-2.25-1.27-3.09-2.5-1.69-2.52-2.98-7.13-1.25-10.25 1.2-2.28 3.35-3.72 5.65-3.76 1.32-.02 2.56.88 3.36.88.8 0 2.31-1.09 3.89-.93.66.03 2.53.27 3.73 2.02-.09.06-2.23 1.35-2.2 4.02.03 3.18 2.8 4.24 2.84 4.26-.03.08-.45 1.52-1.48 3.02zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    </span>
    <span class="app-store-buttons__text">
      <span class="app-store-buttons__kicker">Download on the</span>
      <span class="app-store-buttons__label">App Store</span>
    </span>
  </a>
  {% endif %}
  {% if include.android_url %}
  <a class="app-store-buttons__btn app-store-buttons__btn--android" href="{{ include.android_url }}" rel="noopener noreferrer" target="_blank">
    <span class="app-store-buttons__icon app-store-buttons__icon--play" aria-hidden="true">
      <svg width="18" height="20" viewBox="0 0 24 28" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M1 2.8v22.4L22.4 14 1 2.8zm2.4 4.2L17.2 14 3.4 21V7z"/></svg>
    </span>
    <span class="app-store-buttons__text">
      <span class="app-store-buttons__kicker">Get it on</span>
      <span class="app-store-buttons__label">Google Play</span>
    </span>
  </a>
  {% endif %}
</div>
