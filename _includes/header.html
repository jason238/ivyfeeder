<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img class="site-logo__img site-logo__img--header" src="{{ '/assets/images/logo-tight2.png' | relative_url }}?v={{ site.time | date: '%s' }}" alt="IvyFeeder Inc." width="400" height="80" decoding="async" />
    </a>

    <button
      class="site-nav-toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="site-mobile-nav"
    >
      <span class="site-nav-toggle__icon" aria-hidden="true"></span>
    </button>

    <nav class="site-nav" id="site-mobile-nav" aria-label="Primary">
      <div class="mobile-nav__top" aria-hidden="true">
        <a class="mobile-nav__logo" href="{{ '/' | relative_url }}" tabindex="-1">
          <img class="site-logo__img site-logo__img--header" src="{{ '/assets/images/logo-tight2.png' | relative_url }}?v={{ site.time | date: '%s' }}" alt="" width="400" height="80" loading="lazy" decoding="async" />
        </a>
        <button class="mobile-nav__close" type="button" aria-label="Close menu"></button>
      </div>

      <ul class="site-nav__list">
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/apps/' | relative_url }}" {% if page.url == '/apps/' %}aria-current="page"{% endif %}>Apps</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/blog/' | relative_url }}" {% if page.url == '/blog/' or page.layout == 'post' %}aria-current="page"{% endif %}>Blog</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
