<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img class="site-logo__img site-logo__img--header" src="{{ '/assets/images/logo-tight.png' | relative_url }}" alt="IvyFeeder Inc." width="400" height="80" decoding="async" />
    </a>
    <nav class="site-nav" aria-label="Primary">
      <ul class="site-nav__list">
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/apps/' | relative_url }}" {% if page.url == '/apps/' %}aria-current="page"{% endif %}>Apps</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/blog/' | relative_url }}" {% if page.url == '/blog/' or page.layout == 'post' %}aria-current="page"{% endif %}>Blog</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
