<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <img class="site-logo__img site-logo__img--header" src="{{ '/assets/images/logo.png' | relative_url }}" alt="IvyFeeder Inc." width="400" height="80" decoding="async" />
    </a>
    <nav class="site-nav" aria-label="Primary">
      <ul class="site-nav__list">
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
        </li>
        <li class="site-nav__item site-nav__item--dropdown">
          <details class="nav-dropdown">
            <summary class="nav-dropdown__summary">
              <span class="nav-dropdown__label">Apps</span>
            </summary>
            <ul class="nav-dropdown__panel" role="list">
              {% for app in site.data.apps %}
              <li>
                <a class="nav-dropdown__link" href="{{ app.url | relative_url }}">{{ app.name }}</a>
              </li>
              {% endfor %}
            </ul>
          </details>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/blog/' | relative_url }}" {% if page.url == '/blog/' or page.layout == 'post' %}aria-current="page"{% endif %}>Blog</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a>
        </li>
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ '/privacy-policy/' | relative_url }}" {% if page.url contains 'privacy-policy' %}aria-current="page"{% endif %}>Privacy Policy</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
